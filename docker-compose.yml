services:
  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: gunicorn -b 0.0.0.0:5050 -w 2 --timeout 120 --access-logfile - --error-logfile - app:app
    env_file:
      - ./backend/.env
    environment:
      ML_RELEASES_ROOT: /app/ml/releases
    volumes:
      - ./ml/releases:/app/ml/releases:ro
    restart: unless-stopped
    ports:
      - "80:5050"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python worker.py
    env_file:
      - ./backend/.env
    environment:
      ML_RELEASES_ROOT: /app/ml/releases
    volumes:
      - ./ml/releases:/app/ml/releases:ro
    restart: unless-stopped
    depends_on:
      - backend-api
    profiles:
      - worker
