data:
  raw_candles_path: data/raw/stock_candles.csv
  features_path: data/processed/stock_features_lgbm_v11.csv
model:
  version: lgbm_stock_risk_v11_lowimp_pruned
  asset_type: STOCK
  output_path: models/lgbm_stock_risk_v11_lowimp_pruned.joblib
  horizon_periods: 3
  up_return_threshold: 0.01
  risk_return_threshold: -0.02
  validation_ratio: 0.2
  random_state: 42
  target_column: risk_label
  feature_columns:
  - return_1
  - return_3
  - return_5
  - return_10
  - return_20
  - return_60
  - ma_5_gap
  - ma_60_gap
  - volume_ratio_5
  - volatility_20
  - volatility_60
  - amount_zscore_24
  - relative_return_3
  - relative_return_5
  - relative_return_10
  - market_excess_return_20
  - sector_relative_return_10
  - sector_relative_return_20
  - usdkrw_return_3
  - usdkrw_return_5
  - atr_14
  - bollinger_position_20
  - sector_return_1_mean
  - sector_return_3_mean
  - sector_return_5_mean
  - sector_return_10_mean
  - sector_return_20_mean
  - sector_rank_pct_5
  - sector_strength_score
  - market_avg_return_3
  - market_avg_return_5
  - market_avg_return_10
  - market_breadth_3
  - market_breadth_5
  - market_above_ma20_ratio
  - market_breakout_ratio_20
  - primary_market_return_3
  - primary_market_return_5
  - primary_market_return_10
  - primary_market_return_20
  - primary_market_ma_20_gap
  - primary_market_ma_60_gap
  - primary_market_volatility_20
  - primary_market_drawdown_60
  - market_regime_score
  - macro_KOSPI_return_3
  - macro_KOSPI_return_5
  - macro_KOSDAQ_return_3
  - macro_KOSDAQ_return_5
  - macro_NASDAQ_return_3
  - macro_NASDAQ_return_5
  - macro_USDKRW_ma_20_gap
  - range_ratio_1
  - body_ratio_1
  - upper_wick_ratio_1
  - lower_wick_ratio_1
  - intraday_return
  - overnight_gap
  - abnormal_range_ratio_20
  - breakout_strength_20
  - breakdown_strength_20
  - close_to_high_20
  - close_to_low_20
  - macd_line
  - macd_signal
  - macd_hist
  - day_of_week
  - is_us_asset
  - relative_return_5_x_market_breadth
  - relative_return_10_x_market_breadth
  - sector_relative_return_5_x_sector_breadth
  - sector_relative_return_20_x_sector_rank
  - vcp_contraction_ratio_10_40
  - vcp_volatility_ratio_10_40
  - vcp_volume_dryup_ratio_5_20
  - vcp_volume_dryup_ratio_10_40
  - price_limit_proximity
  - turnover_ratio
  - stoch_k_14
  - stoch_d_3
  - obv_zscore_20
labels:
  neutral_zone_abs_return: 0.003
  drop_neutral_samples: true
training:
  class_weight_mode: balanced
  balance_symbol_weights: true
  use_scale_pos_weight: true
  enable_probability_calibration: true
  calibration_ratio: 0.1
  time_series_cv_splits: 5
  use_ensemble: true
  ensemble_lgbm_weight: 0.7
  ensemble_ridge_weight: 0.3
lightgbm:
  objective: binary
  n_estimators: 250
  learning_rate: 0.009
  num_leaves: 93
  max_depth: 4
  min_child_samples: 53
  subsample: 0.60
  colsample_bytree: 0.64
  reg_alpha: 0.05
  reg_lambda: 0.01
