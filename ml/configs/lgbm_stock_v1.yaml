data:
  raw_candles_path: data/raw/stock_candles.csv
  features_path: data/processed/stock_features_lgbm_v1.csv
  predictions_path: data/processed/stock_predictions_lgbm_v1.csv

model:
  version: lgbm_stock_signal_v1
  asset_type: STOCK
  output_path: models/lgbm_stock_signal_v1.joblib
  horizon_periods: 3
  up_return_threshold: 0.01
  risk_return_threshold: -0.02
  validation_ratio: 0.2
  random_state: 42
  target_column: up_label
  feature_columns:
    - return_1
    - return_3
    - return_5
    - return_10
    - return_20
    - ma_5_gap
    - ma_20_gap
    - volume_ratio_5
    - volatility_20
    - rsi_14

lightgbm:
  objective: binary
  learning_rate: 0.03
  n_estimators: 300
  num_leaves: 31
  max_depth: -1
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
