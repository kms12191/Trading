data:
  raw_candles_path: data/raw/crypto_candles_4h.csv
  features_path: data/processed/crypto_features_lgbm_v11.csv
  predictions_path: data/processed/crypto_short_predictions_lgbm_v11.csv
  backtest_short_summary_path: data/processed/crypto_backtest_short_v11.json
  backtest_short_daily_path: data/processed/crypto_backtest_short_daily_v11.csv
model:
  version: lgbm_crypto_short_v11
  asset_type: CRYPTO
  output_path: models/lgbm_crypto_short_v11.joblib
  horizon_periods: 6
  up_return_threshold: 0.03
  risk_return_threshold: -0.03
  validation_ratio: 0.2
  random_state: 42
  target_column: residual_risk_label
  min_listing_days: 730
  feature_columns:
  - return_1
  - return_3
  - return_6
  - return_12
  - return_24
  - return_60
  - ma_4_gap
  - ma_20_gap
  - ma_60_gap
  - volume_ratio_5
  - volume_ratio_20
  - volatility_5
  - volatility_20
  - volatility_60
  - rsi_14
  - atr_14
  - bollinger_position_20
  - breakout_strength_20
  - breakdown_strength_20
  - reversal_strength_1
  - macd_line
  - macd_signal
  - macd_hist
  - btcusdt_return_1
  - btcusdt_return_6
  - btcusdt_return_24
  - crypto_market_return_6
  - crypto_market_return_24
  - relative_to_market_return_6
  - relative_to_market_return_24
  - kimchi_premium_pct
  - binance_funding_rate
  - hour_of_day
  - day_of_week
  - market_news_sentiment
  - market_news_stress_score
  # v11 신규: BTC 추세 파생 피처
  - btc_trend_filter
  - btc_volatility_4
  - btc_ma_20_gap
labels:
  neutral_zone_abs_return: 0.005
  drop_neutral_samples: true
  use_residual_label: true
  residual_market_symbol: BTCUSDT
prediction:
  short_entry_threshold: 0.35
training:
  class_weight_mode: balanced
  balance_symbol_weights: true
  use_scale_pos_weight: true
  enable_probability_calibration: true
  calibration_ratio: 0.1
  time_series_cv_splits: 5
backtest:
  top_n: 1
  fee_bps: 5
  slippage_bps: 5
  funding_bps_per_horizon: 1
  # v11 신규: -3% 강제 손절 시뮬레이션 (숏은 +3% 강제 청산)
  stop_loss_pct: -0.03
lightgbm:
  verbose: -1
  verbosity: -1
  objective: binary
  learning_rate: 0.018
  n_estimators: 500
  num_leaves: 40
  max_depth: -1
  subsample: 0.82
  colsample_bytree: 0.78
  min_child_samples: 45
  reg_alpha: 0.2
  reg_lambda: 1.2
