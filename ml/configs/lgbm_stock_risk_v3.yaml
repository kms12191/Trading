data:
  raw_candles_path: data/raw/stock_candles.csv
  features_path: data/processed/stock_features_lgbm_v3.csv
  predictions_path: data/processed/stock_risk_predictions_lgbm_v3.csv

model:
  version: lgbm_stock_risk_v3
  asset_type: STOCK
  output_path: models/lgbm_stock_risk_v3.joblib
  horizon_periods: 3
  up_return_threshold: 0.01
  risk_return_threshold: -0.02
  validation_ratio: 0.2
  random_state: 42
  target_column: risk_label
  feature_columns:
    - return_1
    - return_3
    - return_5
    - return_10
    - return_20
    - ma_5_gap
    - ma_20_gap
    - volume_ratio_5
    - volatility_20
    - rsi_14
    - amount_zscore_20
    - amount_zscore_24
    - relative_return_3
    - relative_return_5
    - sector_relative_return_3
    - sector_relative_return_5
    - usdkrw_return_3
    - usdkrw_return_5
    - atr_14
    - bollinger_position_20

lightgbm:
  objective: binary
  learning_rate: 0.03
  n_estimators: 320
  num_leaves: 31
  max_depth: -1
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
