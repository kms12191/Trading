data:
  raw_candles_path: data/raw/stock_candles.csv
  features_path: data/processed/stock_features_lgbm_v10.csv
  predictions_path: data/processed/stock_predictions_lgbm_v10.csv
  backtest_up_only_summary_path: data/processed/stock_backtest_up_only_v10.json
  backtest_up_only_daily_path: data/processed/stock_backtest_up_only_daily_v10.csv
  backtest_composite_summary_path: data/processed/stock_backtest_composite_v10.json
  backtest_composite_daily_path: data/processed/stock_backtest_composite_daily_v10.csv
model:
  version: lgbm_stock_signal_v10
  asset_type: STOCK
  output_path: models/lgbm_stock_signal_v10.joblib
  horizon_periods: 3
  up_return_threshold: 0.01
  risk_return_threshold: -0.02
  validation_ratio: 0.2
  random_state: 42
  target_column: residual_up_label
  feature_columns:
  - return_1
  - return_3
  - return_5
  - return_10
  - return_20
  - ma_5_gap
  - ma_20_gap
  - volume_ratio_5
  - volatility_20
  - rsi_14
  - amount_zscore_20
  - amount_zscore_24
  - volume_zscore_20
  - relative_return_3
  - relative_return_5
  - relative_return_10
  - sector_relative_return_3
  - sector_relative_return_5
  - sector_relative_return_10
  - usdkrw_return_3
  - usdkrw_return_5
  - atr_14
  - bollinger_position_20
  - sector_return_1_mean
  - sector_return_3_mean
  - sector_return_5_mean
  - sector_return_10_mean
  - macro_KOSPI_return_3
  - macro_KOSPI_return_5
  - macro_KOSDAQ_return_3
  - macro_KOSDAQ_return_5
  - macro_NASDAQ_return_3
  - macro_NASDAQ_return_5
  - macro_USDKRW_ma_20_gap
  - range_ratio_1
  - body_ratio_1
  - upper_wick_ratio_1
  - lower_wick_ratio_1
  - intraday_return
  - close_to_high_20
  - close_to_low_20
  - macd_line
  - macd_signal
  - macd_hist
  - day_of_week
  - is_us_asset
  - is_kr_asset
  - news_sentiment
  - news_article_count_24h
  - news_burst_zscore
  - negative_keyword_ratio
  - market_news_sentiment
  - market_news_article_count_24h
  - market_news_burst_zscore
  - market_negative_keyword_ratio
  - warning_flag
  - price_limit_proximity
  - turnover_ratio
  - market_open_flag
  - stoch_k_14
  - stoch_d_3
  - obv_zscore_20
  - vcp_contraction_ratio_5_20
  - vcp_contraction_ratio_10_40
  - vcp_volatility_ratio_10_40
  - vcp_volume_dryup_ratio_5_20
  - vcp_volume_dryup_ratio_10_40
  - vcp_tight_close_ratio_10
  - vcp_breakout_proximity_20
  - vcp_contraction_streak
prediction:
  risk_model_path: models/lgbm_stock_risk_v8.joblib
  long_threshold: 0.20
  stock_min_composite_spread: 0.60
labels:
  neutral_zone_abs_return: 0.003
  drop_neutral_samples: true
  use_residual_label: true
  residual_market_symbol: auto
training:
  class_weight_mode: balanced
  balance_symbol_weights: true
  use_scale_pos_weight: true
  enable_probability_calibration: true
  calibration_ratio: 0.1
  time_series_cv_splits: 5
  use_ensemble: true
  ensemble_lgbm_weight: 0.7
  ensemble_ridge_weight: 0.3
backtest:
  fee_bps: 8
  slippage_bps: 12
  top_n: 1
lightgbm:
  n_estimators: 126
  learning_rate: 0.03867985761704387
  num_leaves: 43
  max_depth: 3
  min_child_samples: 54
  subsample: 0.8380624594912494
  colsample_bytree: 0.8449873693695749
  reg_alpha: 0.0013254139078865493
  reg_lambda: 0.06019283361917798
